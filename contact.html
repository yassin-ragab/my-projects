<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Contact Us</title>
        <link rel="stylesheet" href="style.css">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>

        <header>
            <h1>Personal Course Organizer</h1>
            <nav>
                <a href="home.html">Home</a>
                <a href="courses.html">My Courses</a>
                <a href="add.html">Add Course</a>
                <a href="contact.html">Contact Us</a>
            </nav>
        </header>

        <main>
            <section class="card">
                <h2>Contact Us</h2>
                <p>We would love to hear from you!</p>

                <form>
                    <label for="name">Name:</label>
                    <input autofocus placeholder="Enter your name" type="text" id="name" required>

                    <label for="email">Email:</label>
                    <input placeholder="Enter your email" type="email" id="email" required>

                    <label for="message">Message:</label>
                    <textarea placeholder="Enter your message" id="message" required></textarea>

                    <button type="submit">Send Message</button>
                </form>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 Personal Course Organizer | All Rights Reserved</p>
        </footer>

    </body>
</html>
